version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: linkding
    main: ./cmd/linkding
    binary: linkding
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/chickenzord/linkding-cli/internal/version.Version={{.Version}}
      - -X github.com/chickenzord/linkding-cli/internal/version.GitCommit={{.FullCommit}}
      - -X github.com/chickenzord/linkding-cli/internal/version.BuildDate={{.Date}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
      - goos: linux
        formats: [tar.gz]
      - goos: darwin
        formats: [tar.gz]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^nit:'
      - '^chore:'
      - '^build:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: 'Bug fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: 'Enhancements'
      regexp: "^.*enhancement[(\\w)]*:+.*$"
      order: 2
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## linkding CLI {{ .Tag }}

    CLI for any self-hosted linkding bookmark manager instance.

    ### Installation

    **Binary Download:**
    Download the appropriate binary for your platform from the assets below.

    **Homebrew (macOS/Linux):**
    ```bash
    brew install chickenzord/tap/linkding-cli
    ```

    **Go Install:**
    ```bash
    go install github.com/chickenzord/linkding-cli/cmd/linkding@{{ .Tag }}
    ```

    **Docker:**
    ```bash
    docker pull ghcr.io/chickenzord/linkding-cli:{{ .Tag }}
    ```
  footer: |
    **Full Changelog**: https://github.com/chickenzord/linkding-cli/compare/{{ .PreviousTag }}...{{ .Tag }}

universal_binaries:
  - ids: [linkding]
    replace: false

homebrew_casks:
  - name: linkding-cli
    description: "CLI for any self-hosted linkding bookmark manager instance"
    homepage: https://github.com/chickenzord/linkding-cli
    directory: Formula
    repository:
      owner: chickenzord
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"

